name = "meilleurville"
main = "worker/index.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

# FR production domains. Use Workers routes (not custom_domain) to attach the
# Worker to the EXISTING proxied DNS records — custom_domain refuses to bind a
# hostname that already has A/CNAME records. canonical host is www (matches
# app/layout + sitemap); apex -> www redirect is a follow-up (CF Rule).
routes = [
  { pattern = "www.mavilleideale.fr/*", zone_name = "mavilleideale.fr" },
  { pattern = "mavilleideale.fr/*", zone_name = "mavilleideale.fr" },
]

# Static-first deployment:
#  - `out/` (Next static export, RSC .txt stripped) is served by Workers Static
#    Assets directly at the edge — pages never hit the Worker.
#  - The Worker (worker/index.ts) runs only for asset misses: the /api/* surface,
#    /widget/embed, and the two cron triggers.
[assets]
binding = "ASSETS"
directory = "out"

# NOTE: bestcitiesinfrance.com (EN) is a SEPARATE deploy — the locale is baked at
# build time, so the EN site needs its own export (NEXT_PUBLIC_DEFAULT_LOCALE=en)
# + its own Worker (e.g. name = "meilleurville-en").

# Non-secret env. Read by lib code via process.env (nodejs_compat populates it).
# Secrets (set with `wrangler secret put`): BREVO_API_KEY, ANTHROPIC_API_KEY.
[vars]
NEXT_PUBLIC_DEFAULT_LOCALE = "fr"
NEXT_PUBLIC_BASE_URL = "https://www.mavilleideale.fr"
BREVO_LIST_ID_FR = "4"
BREVO_LIST_ID_EN = "5"
# Global daily cap on Claude API calls (cost backstop, enforced in lib/ai-budget.ts).
# Over budget → the AI endpoints serve their non-AI fallback. Tune without a deploy
# via `wrangler secret`/dashboard, or here. This bounds worst-case Anthropic spend.
AI_DAILY_BUDGET = "1500"

# D1 database for runtime user data (comments, contact, alertes, newsletter).
# Primary location WEUR (Paris CDG). Schema in schema.sql.
[[d1_databases]]
binding = "DB"
database_name = "meilleurville"
database_id = "73295459-dde2-4bbf-9aef-500ddadd581e"

# Cron triggers — dispatched in worker/index.ts scheduled().
# NB: Cloudflare weekdays are 1-7 with 1=Sunday; use 3-letter names to avoid
# ambiguity. Match these exact strings in scheduled() (controller.cron).
#  - Sunday 07:00 UTC -> runCronNewsletter
#  - Monday 08:00 UTC -> runCronAlertes
[triggers]
crons = ["0 7 * * SUN", "0 8 * * MON"]

[observability]
enabled = true

# Cap CPU time per request (default is 30s). This worker does light JSON/D1 work
# and awaits external APIs (I/O wait isn't billed as CPU), so 5s is a safe ceiling
# that bounds any runaway invocation without affecting legitimate requests.
[limits]
cpu_ms = 5000
